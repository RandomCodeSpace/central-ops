name: Reusable CI Security Beta

on:
  workflow_call:
    inputs:
      go_version_file:
        description: Path to go version file
        required: false
        default: go.mod
        type: string
      working_directory:
        description: Working directory for build and tests
        required: false
        default: .
        type: string
      cgo_enabled:
        description: CGO_ENABLED value for build and test
        required: false
        default: "0"
        type: string
      go_test_flags:
        description: Additional flags passed to go test
        required: false
        default: ""
        type: string
      node_version:
        description: Node.js version used when package.json exists
        required: false
        default: "20"
        type: string
      ui_build_command:
        description: Command run in detected UI directory
        required: false
        default: npm ci && npm run build
        type: string
      run_security_scan:
        description: Run security scan stage
        required: false
        default: true
        type: boolean
      run_codeql:
        description: Run CodeQL stage
        required: false
        default: true
        type: boolean
      run_openssf_scorecard:
        description: Run OpenSSF Scorecard stage
        required: false
        default: true
        type: boolean
      run_auto_beta:
        description: Run auto-beta stage on main push
        required: false
        default: true
        type: boolean

concurrency:
  group: reusable-pipeline-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-ci.yml@main
    with:
      go_version_file: ${{ inputs.go_version_file }}
      working_directory: ${{ inputs.working_directory }}
      cgo_enabled: ${{ inputs.cgo_enabled }}
      go_test_flags: ${{ inputs.go_test_flags }}
      node_version: ${{ inputs.node_version }}
      ui_build_command: ${{ inputs.ui_build_command }}

  security-scan:
    name: Security Scan
    if: inputs.run_security_scan
    needs: build-and-test
    uses: RandomCodeSpace/central-ops/.github/workflows/security.yml@main
    secrets: inherit

  codeql:
    name: CodeQL
    if: inputs.run_codeql
    needs: build-and-test
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-codeql.yml@main

  openssf-scorecard:
    name: OpenSSF Scorecard
    if: inputs.run_openssf_scorecard
    needs: build-and-test
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-scorecard.yml@main

  auto-beta:
    name: Auto Beta
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.run_auto_beta && inputs.run_security_scan && inputs.run_codeql && inputs.run_openssf_scorecard
    needs:
      - security-scan
      - codeql
      - openssf-scorecard
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-auto-beta.yml@main
    secrets: inherit
