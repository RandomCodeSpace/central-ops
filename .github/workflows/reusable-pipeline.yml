name: Reusable Pipeline

on:
  workflow_call:
    inputs:
      go_version_file:
        description: Path to go version file
        required: false
        default: go.mod
        type: string
      working_directory:
        description: Working directory for build and tests
        required: false
        default: .
        type: string
      cgo_enabled:
        description: CGO_ENABLED value for build and test
        required: false
        default: "0"
        type: string
      go_test_flags:
        description: Additional flags passed to go test
        required: false
        default: ""
        type: string
      node_version:
        description: Node.js version used when package.json exists
        required: false
        default: "20"
        type: string
      ui_build_command:
        description: Command run in detected UI directory
        required: false
        default: npm ci && npm run build
        type: string
      codeql_languages:
        description: Comma-separated CodeQL language list
        required: false
        default: go,javascript
        type: string
      release_version:
        description: Optional release tag (e.g. v1.2.3). When set, release job runs.
        required: false
        default: ""
        type: string
      run_security_scan:
        description: Run security scan stage
        required: false
        default: true
        type: boolean
      run_codeql:
        description: Run CodeQL stage
        required: false
        default: true
        type: boolean
      run_openssf_scorecard:
        description: Run OpenSSF Scorecard stage
        required: false
        default: true
        type: boolean
      run_auto_beta:
        description: Run auto-beta stage on main push
        required: false
        default: true
        type: boolean
    secrets:
      NPM_TOKEN:
        required: false
      OSSRH_USERNAME:
        required: false
      OSSRH_TOKEN:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release tag (e.g. v1.2.3)
        required: false
        type: string
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  release:
    types: [published]

permissions:
  contents: read
  actions: read

concurrency:
  group: reusable-pipeline-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: detect-ui
        run: |
          set -euo pipefail
          BASE="${{ inputs.working_directory }}"
          if [ -z "$BASE" ] || [ "$BASE" = "." ]; then
            BASE=""
          else
            BASE="${BASE%/}/"
          fi

          if [ -f "${BASE}package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ -n "$BASE" ]; then
              echo "manifest_dir=${BASE%/}" >> "$GITHUB_OUTPUT"
            else
              echo "manifest_dir=." >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ -f "${BASE}ui/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "manifest_dir=${BASE}ui" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "manifest_dir=" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.detect-ui.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ steps.detect-ui.outputs.manifest_dir }}/package-lock.json

      - name: Build frontend
        if: steps.detect-ui.outputs.exists == 'true'
        working-directory: ${{ steps.detect-ui.outputs.manifest_dir }}
        run: ${{ inputs.ui_build_command }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Build
        working-directory: ${{ inputs.working_directory }}
        env:
          CGO_ENABLED: ${{ inputs.cgo_enabled }}
        run: go build ./...

      - name: Vet
        working-directory: ${{ inputs.working_directory }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ inputs.working_directory }}
        env:
          CGO_ENABLED: ${{ inputs.cgo_enabled }}
        run: |
          if [ -n "${{ inputs.go_test_flags }}" ]; then
            go test ${{ inputs.go_test_flags }} ./...
          else
            go test ./...
          fi

  security-scan:
    name: Security Scan
    if: github.event_name != 'release' && inputs.run_security_scan
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: foobar
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  codeql:
    name: CodeQL
    if: github.event_name != 'release' && inputs.run_codeql
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.codeql_languages }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  openssf-scorecard:
    name: OpenSSF Scorecard
    if: github.event_name != 'release' && inputs.run_openssf_scorecard
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  auto-beta:
    name: Auto Beta
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.run_auto_beta && inputs.run_security_scan && inputs.run_codeql && inputs.run_openssf_scorecard
    needs:
      - security-scan
      - codeql
      - openssf-scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next beta version
        id: version
        run: |
          LATEST_BASE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*-beta' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta$' \
            | sort -V | tail -1)

          if [ -z "$LATEST_BASE" ]; then
            LATEST_BASE="v0.0.1-beta"
          fi

          HIGHEST=$(git tag -l "${LATEST_BASE}.[0-9]*" | sort -V | tail -1)

          if [ -z "$HIGHEST" ]; then
            NEXT="${LATEST_BASE}.1"
          else
            N="${HIGHEST##*.}"
            NEXT="${LATEST_BASE}.$((N + 1))"
          fi

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        run: |
          git tag ${{ github.event.inputs.release_version }}
          git push origin ${{ github.event.inputs.release_version }}
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          prerelease: false
          generate_release_notes: true
